name: Collabify CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend_Gl

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build


  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend_Gl

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Give permission to mvnw
        run: chmod +x mvnw

      - name: Run backend tests
        run: ./mvnw test

      - name: Build backend
        run: ./mvnw clean install